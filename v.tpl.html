	<style>
	* {
	  box-sizing: border-box;
	}

	body {
	  margin: 0;
	}

	/* 设置页眉的样式 */
	.header {
	  background-color: #f1f1f1;
	  padding: 20px;
	  text-align: center;
	}

	/* 设置顶部导航栏的样式 */
	.topnav {
	  overflow: hidden;
	  background-color: #333;
	}

	/* 设置 topnav 链接的样式 */
	.topnav a {
	  float: left;
	  display: block;
	  color: #f2f2f2;
	  text-align: center;
	  padding: 14px 16px;
	  text-decoration: none;
	}

	/* 改变鼠标悬停时的颜色 */
	.topnav a:hover {
	  background-color: #ddd;
	  color: black;
	}

	/* 创建并排的三个非等列 */
	.column {
	  float: left;
	  width: 33.33%;
	  padding: 15px;
	}

	/* 清除列之后的浮动 */
	.row:after {
	  content: "";
	  display: table;
	  clear: both;
	}

	/* 响应式布局 - 创建堆叠而非并排的三列 */
	@media screen and (max-width:600px) {
	  .column {
		width: 100%;
	  }
	}

	.wrap {max-width:900px; margin:auto}

	/* 设置页脚的样式 */
	.footer {
	  background-color: #f1f1f1;
	  padding: 10px;
	  text-align: center;
	}
	</style>
